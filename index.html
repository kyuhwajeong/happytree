<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#111118">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>학원 진도 관리</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Bebas+Neue&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ── SPLASH ── -->
<div id="splash">
  <div class="splash-inner">
    <div class="splash-logo">📚</div>
    <div class="splash-title">학원 진도 관리</div>
    <div class="splash-sub">Academy Progress Manager</div>
  </div>
</div>

<!-- ── APP SHELL ── -->
<div id="app" class="hidden">

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <button class="nav-item active" data-page="operate" onclick="App.navigate('operate')">
      <span class="nav-icon">📅</span>
      <span class="nav-label">운용</span>
    </button>
    <button class="nav-item" data-page="manage" onclick="App.navigate('manage')">
      <span class="nav-icon">⚙️</span>
      <span class="nav-label">관리</span>
    </button>
  </nav>

  <!-- ════ PAGE: 운용 ════ -->
  <div id="page-operate" class="page active">

    <div class="page-header">
      <div class="header-left">
        <div class="app-badge">진도</div>
        <div>
          <div class="page-title">수업 진도 운용</div>
          <div class="page-sub" id="op-week-range">주차 정보 로딩중...</div>
        </div>
      </div>
      <div class="header-right">
        <button class="icon-btn" id="save-btn" onclick="App.saveProgress()">
          <span>💾</span>
        </button>
      </div>
    </div>

    <!-- Class selector -->
    <div class="class-selector-wrap">
      <div class="class-selector-label">반 선택</div>
      <div class="class-chips" id="op-class-chips"></div>
    </div>

    <!-- Week navigator -->
    <div class="week-nav">
      <button class="week-btn" onclick="App.prevWeek()">
        <span>‹</span><span class="btn-text">이전 주</span>
      </button>
      <div class="week-center">
        <div class="week-num" id="op-week-num">— 주차</div>
        <div class="week-month" id="op-week-month"></div>
      </div>
      <button class="week-btn" onclick="App.nextWeek()">
        <span class="btn-text">다음 주</span><span>›</span>
      </button>
    </div>

    <!-- Day columns -->
    <div class="days-container" id="days-container">
      <div class="empty-state">반을 선택해주세요</div>
    </div>

  </div>

  <!-- ════ PAGE: 관리 ════ -->
  <div id="page-manage" class="page">

    <div class="page-header">
      <div class="header-left">
        <div class="app-badge" style="background:var(--orange)">관리</div>
        <div>
          <div class="page-title">반 · 교재 관리</div>
          <div class="page-sub">반 정보와 교재를 설정하세요</div>
        </div>
      </div>
      <button class="add-class-btn" onclick="App.openClassModal()">+ 반 추가</button>
    </div>

    <div class="manage-list" id="manage-list">
      <div class="empty-state">등록된 반이 없습니다.<br>+ 반 추가 버튼을 눌러 시작하세요.</div>
    </div>

  </div>

</div>

<!-- ════ MODAL: 반 추가/수정 ════ -->
<div id="modal-overlay" class="modal-overlay hidden" onclick="App.closeModal(event)">
  <div class="modal-sheet" onclick="event.stopPropagation()">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modal-title">반 추가</div>

    <div class="form-group">
      <label class="form-label">반 이름</label>
      <input class="form-input" id="f-class-name" placeholder="예: H1, T2, A반..." maxlength="10">
    </div>

    <div class="form-group">
      <label class="form-label">수업 요일 선택</label>
      <div class="day-check-group" id="f-days">
        <label class="day-check"><input type="checkbox" value="월"><span>월</span></label>
        <label class="day-check"><input type="checkbox" value="화"><span>화</span></label>
        <label class="day-check"><input type="checkbox" value="수"><span>수</span></label>
        <label class="day-check"><input type="checkbox" value="목"><span>목</span></label>
        <label class="day-check"><input type="checkbox" value="금"><span>금</span></label>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">주교재</label>
      <div class="book-list-form" id="f-main-books"></div>
      <button class="add-book-btn" onclick="App.addBookField('main')">+ 주교재 추가</button>
    </div>

    <div class="form-group">
      <label class="form-label">부교재</label>
      <div class="book-list-form" id="f-sub-books"></div>
      <button class="add-book-btn" onclick="App.addBookField('sub')">+ 부교재 추가</button>
    </div>

    <div class="modal-actions">
      <button class="btn-cancel" onclick="App.closeModal()">취소</button>
      <button class="btn-save-modal" onclick="App.saveClass()">저장</button>
    </div>
  </div>
</div>

<!-- ════ TOAST ════ -->
<div id="toast" class="toast hidden"></div>

<script src="db.js"></script>
<script src="app.js"></script>
</body>
</html>
